<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSCPD - Investigation Board</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body>
    <div class="toolbar" id="toolbar">
        <div class="logo">
            <span class="shield">🛡️</span> LSCPD DETECTIVE BUREAU
        </div>
        <div class="toolbar-group editor-only">
            <button id="add-note-btn" class="btn"><span class="icon">📄</span> Ajouter Note</button>
            <button id="add-photo-btn" class="btn"><span class="icon">📸</span> Ajouter Photo</button>
            <button id="link-btn" class="btn"><span class="icon">🔗</span> Relier (On/Off)</button>
            <button id="move-all-btn" class="btn" title="Déplacer tout le tableau"><span class="icon">✋</span> Tout Déplacer</button>
        </div>

        <div class="toolbar-group">
            <span style="color: #aaa; font-size: 0.8rem; margin-right: 5px;">Dossier:</span>
            <input type="text" id="case-name-input" value="" placeholder="Nom du dossier..." style="width: 120px; padding: 4px; background: #222; color: #fff; border: 1px solid #444; border-radius: 2px;">
            <button id="load-case-btn" class="btn" style="padding: 4px 8px;">📂 Charger</button>
            <button id="new-case-btn" class="btn editor-only" style="padding: 4px 8px;" title="Créer une nouvelle enquête">➕</button>
            <button id="rename-case-btn" class="btn editor-only" style="padding: 4px 8px;" title="Renommer le dossier actuel">✏️</button>
        </div>
        
        <div class="toolbar-group">
            <span style="color: #aaa; font-size: 0.8rem; margin-right: 5px;">Zoom</span>
            <input type="range" id="zoom-slider" min="0.3" max="2" step="0.1" value="1" style="cursor: pointer; width: 100px;">
        </div>
        
        <div class="toolbar-group editor-only" style="margin-left: auto;">
            <button id="save-btn" class="btn" style="background-color: #3b82f6;">💾 Sauvegarder</button>
            <button id="clear-btn" class="btn" style="background-color: #ef4444;">🗑️ Vider</button>
        </div>

        <div class="toolbar-group">
            <button id="login-btn" class="btn" style="background: #2563eb;">🔒 Connexion</button>
            <button id="admin-btn" class="btn hidden" style="background: #dc2626;">⚙️ Admin</button>
            <button id="logout-btn" class="btn hidden">🚪 Sortir</button>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 600px;">
            <h3>⚙️ Panel d'Administration</h3>
            <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 15px;">Gérez les enquêtes existantes dans la base de données.</p>
            
            <div id="admin-case-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; background: #1a1a1a; padding: 10px; border-radius: 4px;">
                <!-- Liste des dossiers injectée en JS -->
                <p style="color: #666; text-align: center;">Chargement des dossiers...</p>
            </div>
            
            <div class="modal-buttons">
                <button id="admin-close-btn" class="btn">Fermer</button>
            </div>
        </div>
    </div>

    <div class="board" id="board">
        <div id="board-content" class="board-content">
            <svg id="lines-container"></svg>
            <!-- Les items seront ajoutés ici en JS -->
        </div>
    </div>

    <!-- Modals for input -->
    <div id="photo-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Ajouter une Photo (Preuve)</h3>
            <input type="text" id="photo-url" placeholder="URL de l'image (Ex: https://i.imgur.com/...)">
            <input type="text" id="photo-caption" placeholder="Légende (optionnel)">
            <div class="modal-actions">
                <button id="photo-cancel" class="btn">Annuler</button>
                <button id="photo-confirm" class="btn primary">Ajouter au tableau</button>
            </div>
        </div>
    <!-- Firebase SDK (Version 8 Compat pour la simplicité sans NodeJS) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="script.js"></script>
</body>
</html>
